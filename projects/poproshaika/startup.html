<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

/* =========================================================
   CONFETTI — тип меняется от режима
   ========================================================= */
function fireConfetti(mode) {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  canvas.width = innerWidth * dpr; canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + "px"; canvas.style.height = innerHeight + "px";
  ctx.scale(dpr, dpr);

  const palette = {
    receipt: ["#1a1a1a", "#6a6a6a", "#c2b280", "#8a8a8a"],
    startup: ["#0a0a0a", "#6b5bff", "#00c26e", "#ff6b6b", "#ffd166"],
    chaos:   ["#ff2d55", "#00c26e", "#6b5bff", "#ffe600", "#ff8c00", "#111"],
  }[mode] || ["#111"];

  const glyphs = {
    receipt: ["₽", "•", "—", "x", "=", "*"],
    startup: ["▲", "●", "■", "◆", "★"],
    chaos:   ["💸", "💵", "🪙", "🤑", "💰", "🎉", "!!!", "???", "лол"],
  }[mode];

  const N = mode === "chaos" ? 140 : 90;
  const parts = Array.from({length: N}, () => ({
    x: innerWidth / 2 + (Math.random() - .5) * 60,
    y: innerHeight / 2 + (Math.random() - .5) * 40,
    vx: (Math.random() - .5) * 14,
    vy: -Math.random() * 18 - 6,
    g: 0.45,
    rot: Math.random() * Math.PI * 2,
    vr: (Math.random() - .5) * 0.3,
    size: mode === "chaos" ? 18 + Math.random() * 20 : 10 + Math.random() * 10,
    color: palette[(Math.random() * palette.length) | 0],
    glyph: glyphs[(Math.random() * glyphs.length) | 0],
    life: 0,
  }));

  let raf;
  const start = performance.now();
  function tick(t) {
    const elapsed = (t - start) / 1000;
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    parts.forEach(p => {
      p.vy += p.g;
      p.x += p.vx; p.y += p.vy;
      p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.font = `${p.size}px "JetBrains Mono", system-ui`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(p.glyph, 0, 0);
      ctx.restore();
    });
    if (elapsed < 3) raf = requestAnimationFrame(tick);
    else ctx.clearRect(0, 0, innerWidth, innerHeight);
  }
  cancelAnimationFrame(raf);
  raf = requestAnimationFrame(tick);
}

/* =========================================================
   Общий счётчик — растёт псевдослучайно и синхронно
   ========================================================= */
function usePaidCounter() {
  const base = 1247;
  const seed = Math.floor((Date.now() - new Date("2026-01-01").getTime()) / (1000 * 60 * 17));
  const [n, setN] = useState(base + (seed % 391));
  useEffect(() => {
    const id = setInterval(() => {
      if (Math.random() < 0.35) setN(v => v + 1);
    }, 4200);
    return () => clearInterval(id);
  }, []);
  return n;
}

/* =========================================================
   Кнопка — платёжный триггер
   ========================================================= */
function PayButton({ amount, mode, onPaid, variant = "primary", style, children }) {
  const handle = (e) => {
    e.preventDefault();
    fireConfetti(mode);
    onPaid && onPaid(amount);
    setTimeout(() => {
      window.open(PAY_URL, "_blank", "noopener");
    }, 350);
  };
  return (
    <a href={PAY_URL} onClick={handle} target="_blank" rel="noopener"
       data-variant={variant} style={style}>
      {children}
    </a>
  );
}

/* =========================================================

   ========================================================= */
function App() {
  const [state, setState] = useState(window.TWEAK_DEFAULTS || TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    document.body.setAttribute("data-mode", state.mode);
  }, [state.mode]);

  // Tweaks protocol
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      else if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type: "__edit_mode_available"}, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const update = (patch) => {
    const next = {...state, ...patch};
    setState(next);
    window.parent.postMessage({type: "__edit_mode_set_keys", edits: patch}, "*");
  };

  const MODE_COMPONENT = { receipt: ReceiptMode, startup: StartupMode, chaos: ChaosMode }[state.mode] || ReceiptMode;

  return (
    <>
      <MODE_COMPONENT
        showFaq={state.showFaq}
        showReviews={state.showReviews}
        showCounter={state.showCounter}
      />

      <div className="tweaks" data-open={tweaksOpen}>
        <h4>Tweaks</h4>
        <div style={{fontSize: 10, opacity: .5, marginBottom: 6, letterSpacing: ".1em"}}>РЕЖИМ</div>
        <div className="row">
          {[["receipt","Квитанция"],["startup","Стартап"],["chaos","Хаос"]].map(([k, label]) => (
            <button key={k} className="chip" data-active={state.mode === k}
              onClick={() => update({mode: k})}>
              {label}
            </button>
          ))}
        </div>
        <div style={{fontSize: 10, opacity: .5, margin: "4px 0 6px", letterSpacing: ".1em"}}>СЕКЦИИ</div>
        <label className="toggle">
          <span>Счётчик плательщиков</span>
          <input type="checkbox" checked={state.showCounter}
            onChange={e => update({showCounter: e.target.checked})}/>
        </label>
        <label className="toggle">
          <span>Отзывы</span>
          <input type="checkbox" checked={state.showReviews}
            onChange={e => update({showReviews: e.target.checked})}/>
        </label>
        <label className="toggle">
          <span>FAQ</span>
          <input type="checkbox" checked={state.showFaq}
            onChange={e => update({showFaq: e.target.checked})}/>
        </label>
      </div>
    </>
  );
}
